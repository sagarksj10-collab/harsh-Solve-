name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API keys
        run: |
          sed -i "s|__GEMINI_KEY__|${{ secrets.GEMINI_KEY }}|g" ai-solving-math-fixed-15.html
          sed -i "s|__NVIDIA_KEY__|${{ secrets.NVIDIA_KEY }}|g" ai-solving-math-fixed-15.html
          sed -i "s|__OPENROUTER_KEY__|${{ secrets.OPENROUTER_KEY }}|g" ai-solving-math-fixed-15.html
          sed -i "s|__JSONBIN_BIN_ID__|${{ secrets.JSONBIN_BIN_ID }}|g" ai-solving-math-fixed-15.html
          sed -i "s|__JSONBIN_API_KEY__|${{ secrets.JSONBIN_API_KEY }}|g" ai-solving-math-fixed-15.html
          sed -i "s|__JSONBIN_GUILDS_BIN_ID__|${{ secrets.JSONBIN_GUILDS_BIN_ID }}|g" ai-solving-math-fixed-15.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages
